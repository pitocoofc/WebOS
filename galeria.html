<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 15px; background: #0a0a0a; 
            color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column;
        }

        .toolbar { 
            display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 12px; border-radius: 8px; border: 1px solid #333;
            margin-bottom: 20px;
        }
        
        .btn-action {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-action:hover { border-color: #3b82f6; color: #3b82f6; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px; overflow-y: auto; flex: 1;
        }
        .photo-thumb {
            aspect-ratio: 1/1; background: #111; border-radius: 8px;
            overflow: hidden; cursor: pointer; border: 1px solid #333;
            transition: 0.3s; position: relative;
        }
        .photo-thumb:hover { border-color: #3b82f6; transform: scale(1.05); }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Modal da Câmera Real */
        #camera-modal {
            position: fixed; inset: 0; background: #000; z-index: 500;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .camera-viewport {
            width: 90%; max-width: 450px; aspect-ratio: 3/4;
            background: #000; border: 1px solid #333; position: relative;
            overflow: hidden; border-radius: 15px;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: rgba(59, 130, 246, 0.5);
            top: 0; animation: scan 4s linear infinite; box-shadow: 0 0 15px #3b82f6;
            z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .cam-controls { margin-top: 30px; display: flex; gap: 20px; }
        #canvas-hidden { display: none; }
    </style>
</head>
<body>

    <div class="toolbar">
        <span style="font-size: 10px; letter-spacing: 2px; color: #3b82f6;">NDJ / IMAGE SECTOR</span>
        <div style="display: flex; gap: 8px;">
            <button class="btn-action" onclick="openCamera()">📷 Ativar Bio-Cam</button>
            <button class="btn-action" onclick="window.parent.postMessage({type:'CLOSE_WINDOW'}, '*')">Sair</button>
        </div>
    </div>

    <div class="gallery-grid" id="main-grid"></div>

    <div id="camera-modal">
        <div class="camera-viewport">
            <video id="video" autoplay playsinline></video>
            <div class="scan-line"></div>
            <div style="position:absolute; bottom:15px; left:15px; font-size:10px; color:#3b82f6; z-index:20;">
                BIO-SCANNER READY // DRV_CAM_ACTIVE
            </div>
        </div>
        <div class="cam-controls">
            <button class="btn-action" style="background:#3b82f6; border:none; padding: 15px 30px;" onclick="capture()">CAPTURAR</button>
            <button class="btn-action" onclick="closeCamera()">CANCELAR</button>
        </div>
    </div>

    <canvas id="canvas-hidden" width="640" height="480"></canvas>

    <script>
        const grid = document.getElementById('main-grid');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas-hidden');
        let stream = null;

        // --- INTEGRAÇÃO COM O SISTEMA DE ARQUIVOS ---
        // Salva a foto no "Sete Chaves" (LocalStorage) para o Explorador ver
        function savePhotoToSystem(fileName, base64Data) {
            let userFiles = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            userFiles[fileName] = base64Data; // Salva o binário da imagem
            localStorage.setItem('ndj_user_files', JSON.stringify(userFiles));
            
            // Avisa o OS que um novo arquivo foi criado (opcional)
            console.log("Foto guardada na pasta IMAGENS do sistema.");
        }

        async function openCamera() {
            document.getElementById('camera-modal').style.display = 'flex';
            try {
                // Acessa a câmera real do tablet/celular
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Erro ao acessar hardware: Verifique o driver de câmera no os.html");
                closeCamera();
            }
        }

        function closeCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('camera-modal').style.display = 'none';
        }

        function capture() {
            const context = canvas.getContext('2d');
            // Desenha o frame do vídeo no canvas
            context.translate(canvas.width, 0);
            context.scale(-1, 1); // Desespelha a foto
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/png');
            const fileName = `IMG_${Date.now()}.png`;

            // 1. Salva no sistema de arquivos do Ghost OS
            savePhotoToSystem(fileName, imageData);
            
            // 2. Cria a thumb na galeria
            createThumb(imageData);
            
            closeCamera();
        }

        function createThumb(src) {
            const div = document.createElement('div');
            div.className = 'photo-thumb';
            div.innerHTML = `<img src="${src}">`;
            grid.prepend(div);
        }

        // Carrega fotos já salvas ao abrir
        function loadGallery() {
            let userFiles = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            for (let name in userFiles) {
                if (name.startsWith('IMG_')) {
                    createThumb(userFiles[name]);
                }
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
